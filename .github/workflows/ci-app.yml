name: CI — app

on:
  pull_request:
    branches:
      - dev
      - main
    types:
      - opened
      - synchronize
    paths:
      - "app/**"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Lint
        run: uv run --package hdf_app ruff check app/
