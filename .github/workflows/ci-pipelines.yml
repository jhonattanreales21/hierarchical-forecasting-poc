name: CI — pipelines

on:
  push:
    paths:
      - "pipelines/**"
  pull_request:
    paths:
      - "pipelines/**"

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Lint
        run: uv run --package hierarchical_demand_forecasting_poc ruff check pipelines/

      - name: Test
        run: uv run --package hierarchical_demand_forecasting_poc pytest pipelines/ --cov
