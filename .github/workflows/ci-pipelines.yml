name: CI — pipelines

on:
  pull_request:
    branches:
      - dev
      - main
    types:
      - opened
      - synchronize
    paths:
      - "pipelines/**"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Lint
        continue-on-error: true
        run: uv run --package hdf_pipelines ruff check pipelines/

      - name: Test
        continue-on-error: true
        run: uv run --package hdf_pipelines python -m pytest pipelines/ --cov
