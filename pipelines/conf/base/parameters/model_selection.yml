model_selection:
  primary_metric: "WAPE"
  secondary_metrics:
    - "MASE"
    - "RMSE"
  selection_strategy: "best_by_horizon"
  tie_breaker: "RMSE"

  # --- Monthly multi-family selection (rolling-origin protocol) ---
  # Champions are selected directly on macro-averaged rolling-origin metrics
  # (no held-out test stage). Phase 1 compares Prophet + SARIMAX; CatBoost is
  # re-enabled in Phase 2.
  monthly:
    enabled: true
    active_families:
      - prophet
      - sarimax
    primary_metric: wmape_m3
    direction: minimize
    tie_breakers:
      - wmape_m2
      - wmape_m1
      - mase
      - abs_bias
    # Fail loudly when any active family has no prechampion artifacts.
    require_all_active_families: true
    allow_missing_optional_metrics: true
    mase_seasonal_period: 12
    # Champion Protocol stage 5: refit the elected champion on all available
    # history (train + validation + test) before production inference.
    refit_champion:
      enabled: true
    # Family-champion explainability for the app's Evaluation Report.
    explainability:
      enabled: true
      top_n_features: 15        # display hint; the artifact stores all features
      shap:
        max_samples: null       # null = explain every full-history row
      prophet:
        include_components: true
    output:
      produce_generic_champion: true
      preserve_legacy_prophet_champion: true

  # --- Prophet-specific selection ---
  monthly_prophet:
    date_column: "ds"
    target_column: "y"
    sku_column: "sku"

    selection:
      primary_metric: "wape"
      tie_breakers:
        - "test_m3_wape"
        - "test_m2_wape"
        - "mase"
        - "rmse"
      missing_metric_policy: "skip_with_audit_note"
      business_success_precision_threshold: 0.85

    metrics:
      epsilon: 1.0
      mase_seasonal_period: 12
      horizon_metrics:
        enabled: true
        horizons: [2, 3]

    operational_lead_time:
      enabled: true
      lead_times:
        - 2
        - 3

    regressors:
      mode: "additive"

    refit_champion:
      enabled: true
      use_full_train: true

  # --- SARIMAX adapter settings for multi-family selection ---
  monthly_sarimax:
    enabled: true
    date_column: "month_start_date"
    target_column: "monthly_demand"
    model_family: sarimax

    ljung_box:
      enabled: true
      lags: 10
      pvalue_threshold: 0.05

    operational_lead_time:
      enabled: true
      lead_times:
        - 2
        - 3

  # --- CatBoost adapter settings for multi-family selection ---
  # Column names default to the CatBoost split metadata when omitted. CatBoost
  # candidates are refit on train+validation and scored on the precomputed test
  # feature matrix (leakage-safe: the test split never enters fitting).
  monthly_catboost:
    enabled: true
    date_column: "month_start_date"
    target_column: "monthly_demand"
    model_family: catboost

    # Rolling-origin M-2/M-3 WAPE (operational lead-time). For CatBoost this is
    # computed recursively (predicted demand feeds later lag features), so the
    # lead-time metric matches production inference behaviour.
    operational_lead_time:
      enabled: true
      lead_times:
        - 2
        - 3
