model_selection:
  # Champions are selected directly on the pooled rolling-origin metrics produced
  # by training; there is no separate held-out evaluation stage.
  monthly:
    enabled: true
    active_families:
      - prophet
      - sarimax
      - catboost
    primary_metric: wmape
    direction: minimize
    tie_breakers:
      - wmape_m3
      - wmape_m2
      - wmape_m1
      - mase
      - abs_bias
    # Fail loudly when any active family has no prechampion artifacts.
    require_all_active_families: true
    allow_missing_optional_metrics: true
    mase_seasonal_period: 12
    # Champion Protocol stage 5: refit the elected champion on all available
    # history (train + validation + test) before production inference.
    refit_champion:
      enabled: true
    # Family-champion explainability for the app's Evaluation Report.
    explainability:
      enabled: true
      top_n_features: 15        # display hint; the artifact stores all features
      shap:
        max_samples: null       # null = explain every full-history row
      prophet:
        include_components: true
    output:
      produce_generic_champion: true
      preserve_legacy_prophet_champion: true

  # --- Prophet-specific selection ---
  monthly_prophet:
    date_column: "ds"
    target_column: "y"
    sku_column: "sku"

    selection:
      primary_metric: "wmape"
      tie_breakers:
        - "wmape_m3"
        - "wmape_m2"
        - "mase"
        - "rmse"
      missing_metric_policy: "skip_with_audit_note"
      business_success_precision_threshold: 0.85

    metrics:
      epsilon: 1.0
      mase_seasonal_period: 12
      horizon_metrics:
        enabled: true
        horizons: [2, 3]

    operational_lead_time:
      enabled: true
      lead_times:
        - 2
        - 3

    regressors:
      mode: "additive"

    refit_champion:
      enabled: true
      use_full_train: true

  # --- SARIMAX adapter settings for multi-family selection ---
  monthly_sarimax:
    enabled: true
    date_column: "month_start_date"
    target_column: "monthly_demand"
    model_family: sarimax

    ljung_box:
      enabled: true
      lags: 10
      pvalue_threshold: 0.05

    operational_lead_time:
      enabled: true
      lead_times:
        - 2
        - 3

  # --- CatBoost adapter settings for multi-family selection ---
  # Column names default to the CatBoost split metadata when omitted. CatBoost is
  # evaluated as direct horizon-specific models.
  monthly_catboost:
    enabled: true
    date_column: "month_start_date"
    target_column: "monthly_demand"
    model_family: catboost

    # Per-horizon WMAPE (operational lead-time) from the direct horizon-specific
    # CatBoost models.
    operational_lead_time:
      enabled: true
      lead_times:
        - 2
        - 3
