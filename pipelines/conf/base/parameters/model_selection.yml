model_selection:
  primary_metric: "WAPE"
  secondary_metrics:
    - "MASE"
    - "RMSE"
  selection_strategy: "best_by_horizon"
  tie_breaker: "RMSE"

  monthly_prophet:
    date_column: "ds"
    target_column: "y"
    sku_column: "sku"

    selection:
      primary_metric: "wape"
      tie_breakers:
        - "test_m3_wape"
        - "test_m2_wape"
        - "mase"
        - "rmse"
      missing_metric_policy: "skip_with_audit_note"
      business_success_precision_threshold: 0.85

    metrics:
      epsilon: 1.0
      mase_seasonal_period: 12
      horizon_metrics:
        enabled: true
        horizons: [2, 3]

    operational_lead_time:
      enabled: true
      lead_times:
        - 2
        - 3

    regressors:
      mode: "additive"

    refit_champion:
      enabled: true
      use_full_train: true
