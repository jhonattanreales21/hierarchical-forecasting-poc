forecast_inference:
  mode: "batch"
  include_intervals: true
  confidence_level: 0.90
  daily_allocation:
    enabled: false
    method: "historical_shares"

  monthly_prophet:
    enabled: true
    date_column: "ds"
    sku_column: "sku"

    horizons_months:
      - 3
      - 6

    output:
      include_prediction_intervals: true
      latest_output_horizon_months: 6
      model_family: "prophet"
      model_granularity: "monthly"

    validation:
      fail_on_missing_regressors: true
      fail_on_null_regressors: true
      fail_if_future_contains_y: true
