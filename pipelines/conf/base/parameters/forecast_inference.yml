forecast_inference:
  mode: "batch"
  include_intervals: true
  confidence_level: 0.90
  daily_allocation:
    enabled: false
    method: "historical_shares"

  # Metadata-driven monthly inference: one configuration block for every
  # supported champion family. Dispatch is decided by champion_monthly_metadata.
  monthly:
    enabled: true
    default_horizon: 12
    supported_horizons: [3, 6, 12]
    output_schema_version: "monthly_forecast_v1"
    allow_null_intervals: true
    supported_families:
      - prophet
      - sarimax
      - catboost
    sku_column: "sku"

    # Prophet adapter: native ds/yhat column conventions.
    prophet:
      date_column: "ds"
      prediction_column: "yhat"
      lower_column: "yhat_lower"
      upper_column: "yhat_upper"

    # SARIMAX adapter: confidence intervals from get_forecast().conf_int.
    sarimax:
      date_column: "month_start_date"
      confidence_level: 0.90
      interval_strategy: "conf_int"
      require_future_exogenous_if_trained_with_exog: true
      exogenous_columns: []

    # CatBoost adapter: transitional Phase-1 support. A CatBoost champion is capped
    # at 3 months; Phase 2 replaces the legacy recursive adapter with direct
    # multi-horizon models. Prediction intervals are not produced.
    catboost:
      date_column: "month_start_date"
      target_column: "monthly_demand"
      interval_method: null
      history_source_dataset: "monthly_catboost_full_train"
      split_metadata_source_dataset: "monthly_catboost_split_metadata"
