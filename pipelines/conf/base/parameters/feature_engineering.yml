feature_engineering_monthly:
  date_column: "month_start_date"
  sku_column: "sku"
  target_column: "monthly_demand"

  calendar_features:
    enabled: true
    country_holidays: "CO"
    observed_holidays: true
    weekmask: "Mon Tue Wed Thu Fri"
    min_working_weekday_count_for_flag: 5

  exogenous_features:
    enabled: true
    base_columns:
      - "pfizer_limited"
      - "surgifoam_limited"
      - "rebate_target"
      - "expected_market_share"
    lags: [1, 2]
    derived_features:
      market_share_stress:
        enabled: true
        source_column: "expected_market_share"
        exponent: 1.5
      market_share_uplift:
        enabled: true
        source_column: "expected_market_share"
        baseline: 0.50
