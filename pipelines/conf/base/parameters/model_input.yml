model_input_preparation:
  monthly:
    date_column: "month_start_date"
    target_column: "monthly_demand"
    sku_column: "sku"

    active_regressors:
      - "business_days"
      - "total_tuesdays"
      - "total_thursdays"
      - "working_tuesdays"
      - "working_thursdays"
      - "has_5_working_tuesdays"
      - "has_5_working_thursdays"
      - "tuesday_holidays"
      - "thursday_holidays"
      - "total_holidays"
      - "pfizer_limited"
      - "surgifoam_limited"
      - "rebate_target"
      - "expected_market_share"
      - "pfizer_limited_lag_1"
      - "surgifoam_limited_lag_1"
      - "rebate_target_lag_1"
      - "expected_market_share_lag_1"
      - "pfizer_limited_lag_2"
      - "surgifoam_limited_lag_2"
      - "rebate_target_lag_2"
      - "expected_market_share_lag_2"
      - "pfizer_limited_lag_3"
      - "surgifoam_limited_lag_3"
      - "rebate_target_lag_3"
      - "expected_market_share_lag_3"
      - "market_share_stress"
      - "market_share_stress_lag_1"
      - "market_share_uplift"
      - "market_share_uplift_lag_1"

    missing_values:
      drop_rows_with_null_target: true
      drop_rows_with_null_active_regressors: true

    split:
      mode: "months"
      validation_months: 3
      test_months: 3

    supported_future_horizons: [3, 6, 12]
    min_working_weekday_count_for_flag: 5

  monthly_prophet:
    date_column: "month_start_date"
    target_column: "monthly_demand"
    sku_column: "sku"

    prophet_date_column: "ds"
    prophet_target_column: "y"

    active_regressors:
      - "business_days"
      - "total_tuesdays"
      - "total_thursdays"
      - "working_tuesdays"
      - "working_thursdays"
      - "has_5_working_tuesdays"
      - "has_5_working_thursdays"
      - "tuesday_holidays"
      - "thursday_holidays"
      - "total_holidays"
      - "pfizer_limited"
      - "surgifoam_limited"
      - "rebate_target"
      - "expected_market_share"
      - "pfizer_limited_lag_1"
      - "surgifoam_limited_lag_1"
      - "rebate_target_lag_1"
      - "expected_market_share_lag_1"
      - "pfizer_limited_lag_2"
      - "surgifoam_limited_lag_2"
      - "rebate_target_lag_2"
      - "pfizer_limited_lag_3"
      - "surgifoam_limited_lag_3"
      - "rebate_target_lag_3"
      - "market_share_stress"
      - "market_share_stress_lag_1"
      - "market_share_uplift"
      - "market_share_uplift_lag_1"

    missing_values:
      drop_rows_with_null_target: true
      drop_rows_with_null_active_regressors: true

    split:
      mode: "months"
      validation_months: 3
      test_months: 3
      # Date-based split mode is also supported. Switch mode to "date" and use:
      # mode: "date"
      # train_end_date: "2024-12-01"
      # validation_end_date: "2025-06-01"
      # test_end_date: "2026-03-01"

    future:
      horizons_months: [3, 6, 12]

  monthly_sarimax:
    enabled: true
    date_column: "month_start_date"
    target_column: "monthly_demand"
    sku_column: "sku"
    frequency: "MS"
    exogenous_columns:
      - pfizer_limited
      - pfizer_limited_lag_1
      - pfizer_limited_lag_2
      - pfizer_limited_lag_3
      - surgifoam_limited
      - surgifoam_limited_lag_1
      - surgifoam_limited_lag_2
      - surgifoam_limited_lag_3
      - rebate_target
      - rebate_target_lag_1
      - rebate_target_lag_2
      - rebate_target_lag_3
      - expected_market_share
      - expected_market_share_lag_1
      - expected_market_share_lag_2
      - expected_market_share_lag_3
      - market_share_stress
      - market_share_stress_lag_1
      - market_share_uplift
      - market_share_uplift_lag_1
    allow_empty_exog: true
    require_regular_frequency: true
    sort_by_date: true
    drop_rows_with_null_target: true
    drop_rows_with_null_exog: false
    impute_exog: false
    output_format: "tabular"
