model_input_preparation:
  monthly:
    date_column: "month_start_date"
    target_column: "monthly_demand"
    sku_column: "sku"

    active_regressors:
      - "business_days"
      - "total_tuesdays"
      - "total_thursdays"
      - "working_tuesdays"
      - "working_thursdays"
      - "has_5_working_tuesdays"
      - "has_5_working_thursdays"
      - "tuesday_holidays"
      - "thursday_holidays"
      - "total_holidays"
      - "pfizer_limited"
      - "surgifoam_limited"
      - "rebate_target"
      # - "expected_market_share"
      - "pfizer_limited_lag_1"
      - "surgifoam_limited_lag_1"
      - "rebate_target_lag_1"
      # - "expected_market_share_lag_1"
      - "pfizer_limited_lag_2"
      - "surgifoam_limited_lag_2"
      - "rebate_target_lag_2"
      # - "expected_market_share_lag_2"
      # - "pfizer_limited_lag_3"
      # - "surgifoam_limited_lag_3"
      # - "rebate_target_lag_3"
      # - "expected_market_share_lag_3"
      - "market_share_stress"
      - "market_share_stress_lag_1"
      - "market_share_uplift"
      - "market_share_uplift_lag_1"

    missing_values:
      drop_rows_with_null_target: true
      drop_rows_with_null_active_regressors: true

    # Rolling-origin backtesting replaces the fixed train/validation/test hold-out.
    # The series is kept whole; cycles are sliced internally by the rolling-origin
    # engine. Values interpolate the global rolling-origin parameters.
    rolling_origin:
      horizon: ${forecast_horizon}
      n_cycles: ${n_cycles}
      window: ${rolling_window}
      step_months: ${step_months}
      min_train_periods: ${min_train_periods}

    supported_future_horizons: [3, 6, 12]
    min_working_weekday_count_for_flag: 5

  monthly_prophet:
    date_column: "month_start_date"
    target_column: "monthly_demand"
    sku_column: "sku"

    prophet_date_column: "ds"
    prophet_target_column: "y"

    active_regressors:
      - "business_days"
      - "total_tuesdays"
      - "total_thursdays"
      - "working_tuesdays"
      - "working_thursdays"
      - "has_5_working_tuesdays"
      - "has_5_working_thursdays"
      - "tuesday_holidays"
      - "thursday_holidays"
      - "total_holidays"
      - "pfizer_limited"
      - "surgifoam_limited"
      - "rebate_target"
      # - "expected_market_share"
      - "pfizer_limited_lag_1"
      - "surgifoam_limited_lag_1"
      - "rebate_target_lag_1"
      # - "expected_market_share_lag_1"
      - "pfizer_limited_lag_2"
      - "surgifoam_limited_lag_2"
      - "rebate_target_lag_2"
      # - "pfizer_limited_lag_3"
      # - "surgifoam_limited_lag_3"
      # - "rebate_target_lag_3"
      # - "expected_market_share_lag_2"
      # - "expected_market_share_lag_3"
      - "market_share_stress"
      - "market_share_stress_lag_1"
      - "market_share_uplift"
      - "market_share_uplift_lag_1"

    missing_values:
      drop_rows_with_null_target: true
      drop_rows_with_null_active_regressors: true

    future:
      horizons_months: [3, 6, 12]

  monthly_catboost:
    enabled: true
    date_column: "month_start_date"
    target_column: "monthly_demand"
    sku_column: "sku"

    # CatBoost-specific exogenous regressors. When non-empty, only these columns
    # are kept from the shared monthly split. When empty, all shared active_regressors are used.
    active_regressors: []

    # Target-derived lag features — computed on full history before re-splitting.
    target_lags: [1, 2, 3, 6]

    # Rolling window features on the once-shifted demand series (leakage-safe).
    rolling_windows: [3, 6, 9]
    include_rolling_std: true
    include_rolling_min_max: true

    # Trend difference and percent-change features (also once-shifted).
    trend_diffs: [1, 12]
    trend_pct_changes: [1, 12]

    # Drop leading train rows where target lag features are null (lag warmup period).
    drop_rows_with_null_target_features: true

    # Missingness flags for exogenous columns with known data quality issues.
    # Set to true and list columns to enable.
    include_missingness_flags: false
    missingness_flag_columns: []

  monthly_sarimax:
    enabled: true
    date_column: "month_start_date"
    target_column: "monthly_demand"
    sku_column: "sku"
    frequency: "MS"
    exogenous_columns:
      - pfizer_limited
      - pfizer_limited_lag_1
      - pfizer_limited_lag_2
      # - pfizer_limited_lag_3
      - surgifoam_limited
      - surgifoam_limited_lag_1
      - surgifoam_limited_lag_2
      # - surgifoam_limited_lag_3
      - rebate_target
      - rebate_target_lag_1
      - rebate_target_lag_2
      # - rebate_target_lag_3
      # - expected_market_share
      # - expected_market_share_lag_1
      # - expected_market_share_lag_2
      # - expected_market_share_lag_3
      - market_share_stress
      - market_share_stress_lag_1
      - market_share_uplift
      - market_share_uplift_lag_1
    allow_empty_exog: true
    require_regular_frequency: true
    sort_by_date: true
    drop_rows_with_null_target: true
    drop_rows_with_null_exog: false
    impute_exog: false
    output_format: "tabular"
