train_monthly:
  horizons: [1, 2, 3]
  model_families:
    - "prophet"
    - "catboost"
    - "sarimax"

  prophet:
    enabled: true
    date_column: "ds"
    target_column: "y"
    sku_column: "sku"

    active_regressors:
      - "business_days"
      - "total_tuesdays"
      - "total_thursdays"
      - "working_tuesdays"
      - "working_thursdays"
      - "has_5_working_tuesdays"
      - "has_5_working_thursdays"
      - "tuesday_holidays"
      - "thursday_holidays"
      - "total_holidays"
      - "pfizer_limited"
      - "surgifoam_limited"
      - "rebate_target"
      - "pfizer_limited_lag_1"
      - "surgifoam_limited_lag_1"
      - "rebate_target_lag_1"
      - "pfizer_limited_lag_2"
      - "surgifoam_limited_lag_2"
      - "rebate_target_lag_2"
      - "pfizer_limited_lag_3"
      - "surgifoam_limited_lag_3"
      - "rebate_target_lag_3"

    tuning:
      selection_metric: "mape"
      top_n_prechampions: 3

      candidate_grid:
        changepoint_prior_scale: [0.01, 0.05, 0.1, 0.5]
        seasonality_prior_scale: [1.0, 5.0, 10.0]
        holidays_prior_scale: [1.0, 5.0, 10.0]
        seasonality_mode: ["additive", "multiplicative"]
        yearly_seasonality: [true]
        weekly_seasonality: [false]
        daily_seasonality: [false]
        interval_width: [0.8]

    regressors:
      mode: "additive"

    metrics:
      epsilon: 1.0
      business_success_precision_threshold: 0.85
      horizon_metrics:
        enabled: true
        horizons: [2, 3]

  catboost:
    enabled: true
    tuning:
      iterations: [200, 500, 1000]
      learning_rate: [0.01, 0.05, 0.1]
      depth: [4, 6, 8]

  sarimax:
    enabled: true
    tuning:
      order_grid:
        - [1, 1, 1]
        - [2, 1, 1]
        - [1, 1, 2]
      seasonal_order_grid:
        - [1, 1, 1, 12]
        - [0, 1, 1, 12]
