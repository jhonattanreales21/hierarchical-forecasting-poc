train_monthly:
  horizons: [1, 2, 3]
  model_families:
    - "prophet"
    - "catboost"
    - "sarimax"

  prophet:
    enabled: true
    date_column: "ds"
    target_column: "y"
    sku_column: "sku"

    # Single source of truth for Prophet training: this must match the
    # model-input Prophet adapter and future frames.
    active_regressors: ${model_input_preparation.monthly_prophet.active_regressors}

    tuning:
      optimizer: "optuna"
      # Primary ranking metric is the 3-month-ahead WMAPE, pooled across
      # rolling-origin cycles.
      objective:
        metric: "wmape"
        direction: "minimize"
      max_trials: 100
      top_n_prechampions: 10
      # Rolling-origin backtest run inside every Optuna trial.
      rolling_origin:
        horizon: ${forecast_horizon}
        n_cycles: ${n_cycles}
        window: ${rolling_window}
        step_months: ${step_months}
        min_train_periods: ${min_train_periods}
        mase_seasonal_period: ${mase_seasonal_period}
      # Optuna pruning over the per-cycle running objective.
      pruning:
        enabled: true
        n_startup_trials: 20
        n_warmup_cycles: 2
      sampler:
        name: "tpe"
        seed: ${random_seed}
        n_startup_trials: 40
        multivariate: true
        gamma: 0.40
      search_space:
        changepoint_prior_scale:
          type: "float"
          low: 0.01
          high: 0.5
          log: true
        seasonality_prior_scale:
          type: "float"
          low: 1.0
          high: 10.0
          log: true
        holidays_prior_scale:
          type: "float"
          low: 1.0
          high: 10.0
          log: true
        seasonality_mode:
          type: "categorical"
          choices: ["additive"]
        # Calendar/count regressors: conservative priors to avoid letting
        # deterministic calendar structure dominate the monthly signal.
        prior_scale_business_days:
          type: "categorical"
          choices: [0.01, 0.05, 0.1, 0.5, 1, 5]
        prior_scale_has_5_working_tuesdays:
          type: "categorical"
          choices: [0.01, 0.05, 0.1, 0.5, 1, 5]
        prior_scale_has_5_working_thursdays:
          type: "categorical"
          choices: [0.01, 0.05, 0.1, 0.5, 1, 5]
        prior_scale_tuesday_holidays:
          type: "categorical"
          choices: [0.01, 0.05, 0.1, 0.5, 1, 5]
        prior_scale_thursday_holidays:
          type: "categorical"
          choices: [0.01, 0.05, 0.1, 0.5, 1, 5]

        # Commercial limitation regressors: same range already used for the
        # existing Pfizer limitation lags.
        prior_scale_pfizer_limited:
          type: "categorical"
          choices: [3, 5, 10, 15]
        prior_scale_pfizer_limited_lag_1:
          type: "categorical"
          choices: [3, 5, 10, 15]
        prior_scale_pfizer_limited_lag_2:
          type: "categorical"
          choices: [3, 5, 10, 15]
        # Rebate regressors keep a low-to-moderate range because they may carry
        # direct business signal but should still be regularized.
        prior_scale_rebate_target:
          type: "categorical"
          choices: [0.01, 0.1, 0.5, 1, 5, 10]
        prior_scale_rebate_target_lag_1:
          type: "categorical"
          choices: [0.01, 0.1, 0.5, 1, 5, 10]
        prior_scale_rebate_target_lag_2:
          type: "categorical"
          choices: [0.01, 0.1, 0.5, 1, 5, 10]
        # Market-share transformed features: deliberately low priors because
        # these are scenario/derived variables and can otherwise over-explain.
        prior_scale_market_share_stress:
          type: "categorical"
          choices: [0.01, 0.05, 0.1, 0.5, 1, 5, 10]
        prior_scale_market_share_stress_lag_1:
          type: "categorical"
          choices: [0.01, 0.05, 0.1, 0.5, 1, 5, 10]
        prior_scale_market_share_uplift:
          type: "categorical"
          choices: [0.01, 0.05, 0.1, 0.5, 1, 5, 10]
        # prior_scale_market_share_uplift_lag_1:
        #   type: "categorical"
        #   choices: [0.01, 0.05, 0.1, 0.5, 1, 5, 10]
      fixed_params:
        yearly_seasonality: false
        weekly_seasonality: false
        daily_seasonality: false
        interval_width: 0.8

    regressors:
      mode: "additive"

    metrics:
      epsilon: 1.0
      mase_seasonal_period: ${mase_seasonal_period}
      # Per-horizon WMAPE is produced by the rolling-origin engine.

  catboost:
    enabled: true
    primary_metric: "wmape"
    selection_direction: "minimize"
    random_seed: ${random_seed}
    prechampion_count: 10
    mase_seasonal_period: ${mase_seasonal_period}
    epsilon: 1.0
    max_trials: 40
    max_failed_trials: 20
    sampler:
      name: "tpe"
      seed: ${random_seed}
      n_startup_trials: 10
      multivariate: true
      gamma: 0.40
    # Rolling-origin backtest run inside every Optuna trial.
    rolling_origin:
      horizon: ${forecast_horizon}
      n_cycles: ${n_cycles}
      window: ${rolling_window}
      step_months: ${step_months}
      min_train_periods: ${min_train_periods}
      mase_seasonal_period: ${mase_seasonal_period}
    pruning:
      enabled: true
      n_startup_trials: 10
      n_warmup_cycles: 1
    search_space:
      depth:
        type: "int"
        low: 3
        high: 8
      learning_rate:
        type: "float"
        low: 0.01
        high: 0.2
        log: true
      iterations:
        type: "int"
        low: 400
        high: 1200
      l2_leaf_reg:
        type: "float"
        low: 3.0
        high: 8.0
        log: true
      subsample:
        type: "float"
        low: 0.85
        high: 1.0
      colsample_bylevel:
        type: "float"
        low: 0.85
        high: 1.0
      min_data_in_leaf:
        type: "int"
        low: 2
        high: 15
    fixed_params:
      loss_function: "RMSE"

  sarimax:
    enabled: true
    date_column: "month_start_date"
    target_column: "monthly_demand"
    objective:
      metric: "wmape"
      direction: "minimize"
    top_n_prechampions: 10
    max_failed_trials: 30
    metrics:
      mase_seasonal_period: ${mase_seasonal_period}
      epsilon: 1.0
    # Ljung-Box residual eligibility, applied on the final rolling-origin cycle
    # before ranking.
    ljung_box:
      enabled: true
      lags: 10
      pvalue_threshold: 0.05
    tuning:
      optimizer: "optuna"
      max_trials: 30
      use_exog: true
      # Rolling-origin backtest run inside every Optuna trial.
      rolling_origin:
        horizon: ${forecast_horizon}
        n_cycles: ${n_cycles}
        window: ${rolling_window}
        step_months: ${step_months}
        min_train_periods: ${min_train_periods}
        mase_seasonal_period: ${mase_seasonal_period}
      pruning:
        enabled: true
        n_startup_trials: 10
        n_warmup_cycles: 2
      sampler:
        name: "tpe"
        seed: ${random_seed}
        n_startup_trials: 10
        multivariate: true
        gamma: 0.40
      search_space:
        p:
          type: "int"
          low: 0
          high: 3
        d:
          type: "int"
          low: 0
          high: 2
        q:
          type: "int"
          low: 0
          high: 3
        P:
          type: "int"
          low: 0
          high: 2
        D:
          type: "int"
          low: 0
          high: 1
        Q:
          type: "int"
          low: 0
          high: 2
        trend:
          type: "categorical"
          choices: ["none", "n"] #"c", "t"
      fixed_params:
        s: 12
        enforce_stationarity: false
        enforce_invertibility: false
