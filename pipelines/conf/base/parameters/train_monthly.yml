train_monthly:
  horizons: [1, 2, 3]
  model_families:
    - "prophet"
    - "catboost"
    - "sarimax"

  prophet:
    enabled: true
    tuning:
      changepoint_prior_scale: [0.01, 0.05, 0.1, 0.5]
      seasonality_prior_scale: [1.0, 5.0, 10.0]
      seasonality_mode: ["additive", "multiplicative"]

  catboost:
    enabled: true
    tuning:
      iterations: [200, 500, 1000]
      learning_rate: [0.01, 0.05, 0.1]
      depth: [4, 6, 8]

  sarimax:
    enabled: true
    tuning:
      order_grid:
        - [1, 1, 1]
        - [2, 1, 1]
        - [1, 1, 2]
      seasonal_order_grid:
        - [1, 1, 1, 12]
        - [0, 1, 1, 12]
