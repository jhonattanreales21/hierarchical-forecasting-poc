train_monthly:
  horizons: [1, 2, 3]
  model_families:
    - "prophet"
    - "catboost"
    - "sarimax"

  prophet:
    enabled: true
    date_column: "ds"
    target_column: "y"
    sku_column: "sku"

    active_regressors:
      - "business_days"
      - "total_tuesdays"
      - "total_thursdays"
      - "working_tuesdays"
      - "working_thursdays"
      - "has_5_working_tuesdays"
      - "has_5_working_thursdays"
      - "tuesday_holidays"
      - "thursday_holidays"
      - "total_holidays"
      - "pfizer_limited"
      - "surgifoam_limited"
      - "rebate_target"
      - "expected_market_share"
      - "pfizer_limited_lag_1"
      - "surgifoam_limited_lag_1"
      - "rebate_target_lag_1"
      - "expected_market_share_lag_1"
      - "pfizer_limited_lag_2"
      - "surgifoam_limited_lag_2"
      - "rebate_target_lag_2"
      - "pfizer_limited_lag_3"
      - "surgifoam_limited_lag_3"
      - "rebate_target_lag_3"
      - "market_share_stress"
      - "market_share_stress_lag_1"
      - "market_share_uplift"
      - "market_share_uplift_lag_1"

    tuning:
      optimizer: "optuna"
      objective:
        metric: "wape"
        direction: "minimize"
      max_trials: 15
      top_n_prechampions: 5
      sampler:
        name: "tpe"
        seed: ${random_seed}
      search_space:
        changepoint_prior_scale:
          type: "float"
          low: 0.01
          high: 0.5
          log: true
        seasonality_prior_scale:
          type: "float"
          low: 1.0
          high: 10.0
          log: true
        holidays_prior_scale:
          type: "float"
          low: 1.0
          high: 10.0
          log: true
        seasonality_mode:
          type: "categorical"
          choices: ["additive", "multiplicative"]
      fixed_params:
        yearly_seasonality: true
        weekly_seasonality: false
        daily_seasonality: false
        interval_width: 0.8

    regressors:
      mode: "additive"

    metrics:
      epsilon: 1.0
      mase_seasonal_period: 12
      business_success_precision_threshold: 0.85
      horizon_metrics:
        enabled: true
        horizons: [2, 3]

  catboost:
    enabled: true
    tuning:
      iterations: [200, 500, 1000]
      learning_rate: [0.01, 0.05, 0.1]
      depth: [4, 6, 8]

  sarimax:
    enabled: true
    date_column: "month_start_date"
    target_column: "monthly_demand"
    objective:
      metric: "wape"
      direction: "minimize"
    top_n_prechampions: 10
    max_failed_trials: 60
    validation:
      forecast_steps: 3
    metrics:
      mase_seasonal_period: 12
      epsilon: 1.0
    tuning:
      optimizer: "optuna"
      max_trials: 20
      use_exog: true
      sampler:
        name: "tpe"
        seed: ${random_seed}
      search_space:
        p:
          type: "int"
          low: 0
          high: 3
        d:
          type: "int"
          low: 0
          high: 2
        q:
          type: "int"
          low: 0
          high: 3
        P:
          type: "int"
          low: 0
          high: 2
        D:
          type: "int"
          low: 0
          high: 1
        Q:
          type: "int"
          low: 0
          high: 2
        trend:
          type: "categorical"
          choices: ["none", "n", "c", "t"]
      fixed_params:
        s: 12
        enforce_stationarity: false
        enforce_invertibility: false
