train_monthly:
  horizons: [1, 2, 3]
  model_families:
    - "prophet"
    - "catboost"
    - "sarimax"

  prophet:
    enabled: true
    date_column: "ds"
    target_column: "y"
    sku_column: "sku"

    active_regressors:
      - "business_days"
      - "total_tuesdays"
      - "total_thursdays"
      - "working_tuesdays"
      - "working_thursdays"
      - "has_5_working_tuesdays"
      - "has_5_working_thursdays"
      - "tuesday_holidays"
      - "thursday_holidays"
      - "total_holidays"
      - "pfizer_limited"
      - "surgifoam_limited"
      - "rebate_target"
      # - "expected_market_share"
      - "pfizer_limited_lag_1"
      - "surgifoam_limited_lag_1"
      - "rebate_target_lag_1"
      # - "expected_market_share_lag_1"
      - "pfizer_limited_lag_2"
      - "surgifoam_limited_lag_2"
      - "rebate_target_lag_2"
      # - "pfizer_limited_lag_3"
      # - "surgifoam_limited_lag_3"
      # - "rebate_target_lag_3"
      - "market_share_stress"
      - "market_share_stress_lag_1"
      - "market_share_uplift"
      - "market_share_uplift_lag_1"

    tuning:
      optimizer: "optuna"
      # Primary ranking metric is the 3-month-ahead WMAPE, pooled across
      # rolling-origin cycles.
      objective:
        metric: "wmape_m3"
        direction: "minimize"
      max_trials: 50
      top_n_prechampions: 10
      # Rolling-origin backtest run inside every Optuna trial (protocol §4).
      rolling_origin:
        horizon: ${forecast_horizon}
        n_cycles: ${n_cycles}
        window: ${rolling_window}
        step_months: ${step_months}
        min_train_periods: ${min_train_periods}
        mase_seasonal_period: ${mase_seasonal_period}
      # Optuna pruning over the per-cycle running objective (protocol §9.2).
      pruning:
        enabled: true
        n_startup_trials: 10
        n_warmup_cycles: 1
      sampler:
        name: "tpe"
        seed: ${random_seed}
        n_startup_trials: 40
        multivariate: true
        gamma: 0.40
      search_space:
        changepoint_prior_scale:
          type: "float"
          low: 0.01
          high: 0.5
          log: true
        seasonality_prior_scale:
          type: "float"
          low: 1.0
          high: 10.0
          log: true
        holidays_prior_scale:
          type: "float"
          low: 1.0
          high: 10.0
          log: true
        seasonality_mode:
          type: "categorical"
          choices: ["additive", "multiplicative"]
        prior_scale_pfizer_limited_lag_1:
          type: "categorical"
          choices: [5, 10, 20, 25]
        prior_scale_pfizer_limited_lag_2:
          type: "categorical"
          choices: [5, 10, 20, 25]
        prior_scale_surgifoam_limited_lag_1:
          type: "categorical"
          choices: [0.01, 0.1, 0.5, 1, 5, 10]
        prior_scale_surgifoam_limited_lag_2:
          type: "categorical"
          choices: [0.01, 0.1, 0.5, 1, 5, 10]
        prior_scale_rebate_target:
          type: "categorical"
          choices: [0.01, 0.1, 0.5, 1, 5]
        prior_scale_rebate_target_lag_1:
          type: "categorical"
          choices: [0.01, 0.1, 0.5, 1, 5]
        prior_scale_market_share_stress:
          type: "categorical"
          choices: [5, 10, 20]
        prior_scale_market_share_uplift:
          type: "categorical"
          choices: [5, 10, 20]
      fixed_params:
        yearly_seasonality: false
        weekly_seasonality: false
        daily_seasonality: false
        interval_width: 0.8

    regressors:
      mode: "additive"

    metrics:
      epsilon: 1.0
      mase_seasonal_period: ${mase_seasonal_period}
      # Per-horizon WMAPE (M-1, M-2, M-3) is produced by the rolling-origin engine.

  catboost:
    enabled: true
    primary_metric: "wape"
    selection_direction: "minimize"
    random_seed: ${random_seed}
    early_stopping_rounds: 100
    prechampion_count: 10
    mase_seasonal_period: 12
    epsilon: 1.0
    max_trials: 100
    max_failed_trials: 25
    sampler:
      name: "tpe"
      seed: ${random_seed}
      n_startup_trials: 50
      multivariate: true
      gamma: 0.40
    search_space:
      depth:
        type: "int"
        low: 3
        high: 8
      learning_rate:
        type: "float"
        low: 0.005
        high: 0.5
        log: true
      iterations:
        type: "int"
        low: 100
        high: 1000
      l2_leaf_reg:
        type: "float"
        low: 1.0
        high: 10.0
        log: true
      subsample:
        type: "float"
        low: 0.75
        high: 1.0
      colsample_bylevel:
        type: "float"
        low: 0.75
        high: 1.0
      min_data_in_leaf:
        type: "int"
        low: 2
        high: 15
    fixed_params:
      loss_function: "RMSE"

  sarimax:
    enabled: true
    date_column: "month_start_date"
    target_column: "monthly_demand"
    objective:
      metric: "wmape_m3"
      direction: "minimize"
    top_n_prechampions: 10
    max_failed_trials: 30
    metrics:
      mase_seasonal_period: ${mase_seasonal_period}
      epsilon: 1.0
    # Ljung-Box residual eligibility, applied inside the rolling-origin before
    # ranking (protocol §3.9). Residuals come from the full-history (through L) fit.
    ljung_box:
      enabled: true
      lags: 10
      pvalue_threshold: 0.05
    tuning:
      optimizer: "optuna"
      max_trials: 40
      use_exog: true
      # Rolling-origin backtest run inside every Optuna trial (protocol §4).
      rolling_origin:
        horizon: ${forecast_horizon}
        n_cycles: ${n_cycles}
        window: ${rolling_window}
        step_months: ${step_months}
        min_train_periods: ${min_train_periods}
        mase_seasonal_period: ${mase_seasonal_period}
      pruning:
        enabled: true
        n_startup_trials: 10
        n_warmup_cycles: 1
      sampler:
        name: "tpe"
        seed: ${random_seed}
        n_startup_trials: 40
        multivariate: true
        gamma: 0.40
      search_space:
        p:
          type: "int"
          low: 0
          high: 3
        d:
          type: "int"
          low: 0
          high: 2
        q:
          type: "int"
          low: 0
          high: 3
        P:
          type: "int"
          low: 0
          high: 2
        D:
          type: "int"
          low: 0
          high: 1
        Q:
          type: "int"
          low: 0
          high: 2
        trend:
          type: "categorical"
          choices: ["none", "n"] #"c", "t"
      fixed_params:
        s: 12
        enforce_stationarity: false
        enforce_invertibility: false
